<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Manche — positions d'accords</title>
<meta name="description" content="Toutes les positions d'un accord sur le manche, guitare et basse. Hors-ligne, sans dépendance.">
<meta name="theme-color" content="#171310">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app">
  <span class="wordmark">Guitar Chords<span class="dot">.</span></span>
  <span class="tagline">Positions d’accords</span>
</header>

<div class="controls">
  <div class="notes" id="notes" aria-label="Note fondamentale"></div>
  <div class="selects">
    <select id="chordType" aria-label="Type d’accord"></select>
    <select id="tuning" aria-label="Accordage"></select>
    <button class="gear" id="gearBtn" aria-expanded="false" aria-controls="options" title="Options">⚙</button>
  </div>
  <div class="freechord">
    <input id="freeInput" placeholder="Accord libre… ex. CM7add11, F♯m7♭5/A"
           autocapitalize="characters" autocomplete="off" spellcheck="false"
           aria-label="Nom d’accord libre">
    <button id="freeGo" title="Chercher les positions" aria-label="Chercher">→</button>
    <button id="freeSave" title="Enregistrer ce type d’accord" aria-label="Enregistrer">★</button>
  </div>
  <div class="free-msg" id="freeMsg" role="status"></div>
  <div id="options">
    <div class="row">
      <label for="optBass">Basse
        <span class="hint">Note la plus grave des positions (Cm/G : choisir G)</span>
      </label>
      <select id="optBass"></select>
    </div>
    <div class="row">
      <label for="optOmit5">Notes omissibles
        <span class="hint">Quinte juste (accords de 4 sons et plus) et 9ᵉ des accords de 11/13</span>
      </label>
      <input type="checkbox" id="optOmit5" checked>
    </div>
    <div class="row">
      <label for="optLabels">Pastilles</label>
      <select id="optLabels">
        <option value="intervals" selected>Intervalles</option>
        <option value="notes">Notes</option>
      </select>
    </div>
    <div class="row" id="savedRow" hidden>
      <div style="flex:1">
        <label>Mes accords enregistrés</label>
        <div class="saved-list" id="savedList"></div>
      </div>
    </div>
    <div class="row">
      <label for="optTheme">Thème</label>
      <select id="optTheme">
        <option value="auto" selected>Auto (système)</option>
        <option value="dark">Sombre</option>
        <option value="light">Clair</option>
      </select>
    </div>
    <div class="row">
      <label for="optMaxFret">Cases explorées</label>
      <select id="optMaxFret">
        <option value="12">12</option>
        <option value="15" selected>15</option>
        <option value="19">19</option>
      </select>
    </div>
  </div>
</div>

<div class="fretbar-wrap">
  <div class="fretbar" id="fretbar" role="group" aria-label="Filtrer par position sur le manche"></div>
  <div class="fretbar-info">
    <span id="fretbarLabel"></span>
    <button id="fretbarClear" hidden aria-label="Tout le manche">✕ tout le manche</button>
  </div>
</div>

<div class="chord-banner">
  <h1 class="chord-name" id="chordName"></h1>
  <span class="chord-tones" id="chordTones"></span>
  <span class="chord-count" id="chordCount"></span>
</div>

<main id="results"></main>
<div class="more-wrap" id="moreWrap" hidden>
  <button class="more" id="moreBtn"></button>
</div>

<footer class="app">Touchez un diagramme pour l’entendre · fonctionne hors-ligne</footer>

<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
