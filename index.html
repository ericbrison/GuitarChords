<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Manche — positions d'accords</title>
<meta name="description" content="Toutes les positions d'un accord sur le manche, guitare et basse. Hors-ligne, sans dépendance.">
<meta name="theme-color" content="#171310">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css?v37">
</head>
<body>

<header class="app">
  <span class="wordmark">Guitar Chords<span class="dot">.</span></span>
  <span class="tagline">Positions d’accords</span>
</header>

<nav class="tools" aria-label="Outils">
  <button id="tabChords" aria-pressed="true">Accords</button>
  <button id="tabScales" aria-pressed="false">Gammes</button>
  <button class="gear" id="gearBtn" aria-expanded="false" aria-controls="options" title="Options">⚙</button>
</nav>

<div id="options">
  <div class="row">
    <label>Mise à jour
      <span class="hint" id="updHint"></span>
    </label>
    <button id="optUpdate" class="upd-btn">Vérifier</button>
  </div>
  <div class="row">
    <label for="optInv">Renversements
      <span class="hint">Basse libre quand aucune basse n’est imposée dans le sélecteur</span>
    </label>
    <input type="checkbox" id="optInv">
  </div>
  <div class="row">
    <label for="optOmit5">Notes omissibles
      <span class="hint">Quinte juste (accords de 4 sons et plus) et 9ᵉ des accords de 11/13</span>
    </label>
    <input type="checkbox" id="optOmit5" checked>
  </div>
  <div class="row">
    <label for="optLabels">Pastilles</label>
    <select id="optLabels">
      <option value="intervals" selected>Intervalles</option>
      <option value="notes">Notes</option>
    </select>
  </div>
  <div class="row">
    <label for="optNotation">Notation des notes</label>
    <select id="optNotation">
      <option value="anglo" selected>A, B, C…</option>
      <option value="latin">Do, Ré, Mi…</option>
    </select>
  </div>
  <div class="row">
    <label for="tuning">Accordage</label>
    <select id="tuning"></select>
  </div>
  <div class="row" id="savedScalesRow" hidden>
    <div style="flex:1">
      <label>Mes gammes enregistrées</label>
      <div class="saved-list" id="savedScalesList"></div>
    </div>
  </div>
  <div class="row" id="savedRow" hidden>
    <div style="flex:1">
      <label>Mes accords enregistrés</label>
      <div class="saved-list" id="savedList"></div>
    </div>
  </div>
  <div class="row">
    <label for="optBig">Grande taille
      <span class="hint">Une colonne, pastilles et textes agrandis</span>
    </label>
    <input type="checkbox" id="optBig">
  </div>
  <div class="row">
    <label for="optTheme">Thème</label>
    <select id="optTheme">
      <option value="auto" selected>Auto (système)</option>
      <option value="dark">Sombre</option>
      <option value="light">Clair</option>
    </select>
  </div>
  <div class="row">
    <label for="optMaxFret">Cases explorées (accords)</label>
    <select id="optMaxFret">
      <option value="12">12</option>
      <option value="15">15</option>
      <option value="19">19</option>
      <option value="22" selected>22</option>
    </select>
  </div>
</div>

<div class="controls">
  <div class="selects chord-line">
    <select id="rootSel" aria-label="Fondamentale"></select>
    <select id="chordType" aria-label="Type d’accord"></select>
    <span class="slash-sep" aria-hidden="true">/</span>
    <select id="optBass" aria-label="Note à la basse"></select>
  </div>
  <div class="freechord">
    <input id="freeInput" placeholder="Accord libre… ex. CM7add11, F♯m7♭5/A"
           autocapitalize="sentences" autocomplete="off" spellcheck="false"
           aria-label="Nom d’accord libre">
    <button id="freeGo" title="Chercher les positions" aria-label="Chercher">→</button>
    <button id="freeSave" title="Enregistrer ce type d’accord" aria-label="Enregistrer">★</button>
  </div>
  <div class="free-msg" id="freeMsg" role="status"></div>
</div>

<div class="fretbar-wrap">
  <div class="range2" id="range2">
    <div class="range2-track"><div class="range2-fill" id="rangeFill"></div></div>
    <input type="range" id="fretMinR" min="1" max="22" step="1" value="1"
           aria-label="Première case de la plage">
    <input type="range" id="fretMaxR" min="1" max="22" step="1" value="22"
           aria-label="Dernière case de la plage">
    <div class="range2-scale" id="rangeScale"></div>
  </div>
  <div class="fretbar-info">
    <span id="fretbarLabel"></span>
    <button id="fretbarClear" hidden aria-label="Tout le manche">✕ tout le manche</button>
  </div>
</div>

<div class="chord-banner chords">
  <h1 class="chord-name" id="chordName"></h1>
  <span class="chord-tones" id="chordTones"></span>
  <span class="chord-count" id="chordCount"></span>
</div>

<main id="results"></main>
<div class="more-wrap" id="moreWrap" hidden>
  <button class="more" id="moreBtn"></button>
</div>

<section id="toolScales">
  <div class="selects">
    <select id="scaleRoot" aria-label="Fondamentale de la gamme"></select>
    <select id="scaleSel" aria-label="Gamme"></select>
  </div>
  <div class="ivchips" id="ivChips" aria-label="Degrés de la gamme (toucher pour ajouter/retirer)"></div>
  <div class="freechord">
    <input id="scaleName" placeholder="Nom de votre gamme… ex. Penta blues perso"
           autocapitalize="sentences" autocomplete="off" spellcheck="false"
           aria-label="Nom de la gamme personnalisée">
    <button id="scaleSave" title="Enregistrer cette gamme" aria-label="Enregistrer">★</button>
  </div>
  <div class="free-msg" id="scaleMsg" role="status"></div>
  <div class="chord-banner">
    <h1 class="chord-name" id="scaleTitle"></h1>
    <span class="chord-tones" id="scaleTones"></span>
  </div>
  <div class="selects neck-opts">
    <select id="optNeck" aria-label="Orientation du manche">
      <option value="h-left" selected>Horizontal</option>
      <option value="v-top">Vertical</option>
    </select>
    <span class="neck-zoom" role="group" aria-label="Agrandissement du manche">
      <button id="neckZoomOut" aria-label="Réduire">−</button>
      <span id="neckZoomLabel">100 %</span>
      <button id="neckZoomIn" aria-label="Agrandir">+</button>
    </span>
    <select id="scaleFrets" aria-label="Nombre de cases du manche">
      <option value="15">15 cases</option>
      <option value="19">19 cases</option>
      <option value="22" selected>22 cases</option>
      <option value="24">24 cases</option>
    </select>
  </div>
  <div class="neck-wrap" id="neckWrap"><div class="neck-canvas" id="neckCanvas"></div></div>
  <p class="neck-hint">− / + ou pincement pour agrandir le manche</p>
</section>

<footer class="app">Fonctionne hors-ligne · <span id="appVersion"></span></footer>

<script src="engine.js?v37"></script>
<script src="app.js?v37"></script>
</body>
</html>
